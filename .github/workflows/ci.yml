name: VSL Continuous Integration

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'static/DOCS.md'
      - 'docs/**'
      - 'examples/**/README.md'

  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'static/DOCS.md'
      - 'docs/**'
      - 'examples/**/README.md'

jobs:
  run-tests-on-linux:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-22.04
        flags:
          - ""
          - "--prod"

    steps:
      - name: Checkout VSL
        uses: actions/checkout@v4
        with:
          path: vsl

      - name: Setup V
        uses: vlang/setup-v@v1.6
        with:
          check-latest: true

      - name: V doctor
        run: v doctor

      - name: Install dependencies
        run: |
          sudo apt-get update && \
          sudo apt-get install --quiet -y --no-install-recommends \
            gfortran \
            libxi-dev \
            libxcursor-dev \
            mesa-common-dev \
            liblapacke-dev \
            libopenblas-dev \
            libgc-dev \
            libgl1-mesa-dev \
            libopenmpi-dev \
            libhdf5-dev \
            hdf5-tools \
            opencl-headers \
            ocl-icd-opencl-dev \
            vulkan-tools \
            mesa-vulkan-drivers \
            libvulkan-dev

      - name: Move VSL source code to V Modules
        run: mv ./vsl ~/.vmodules

      - name: Execute Tests using Pure V Backend
        run: |
          v wipe-cache
          ~/.vmodules/vsl/bin/test ${{ matrix.flags }} --use-cblas

      - name: Execute Tests using Pure V Backend with Pure C Backend
        run: |
          v wipe-cache
          ~/.vmodules/vsl/bin/test ${{ matrix.flags }} --use-cblas --use-lapacke

      - name: Execute Tests using Vulkan Compute Backend
        run: |
          v wipe-cache
          ~/.vmodules/vsl/bin/test ${{ matrix.flags }} --use-vulkan

  run-windows-smoke:
    name: Windows compute smoke
    runs-on: windows-latest

    steps:
      - name: Checkout VSL
        uses: actions/checkout@v4
        with:
          path: vsl

      - name: Setup V
        uses: vlang/setup-v@v1.6
        with:
          check-latest: true

      - name: V doctor
        run: v doctor

      - name: Move VSL source code to V Modules
        shell: bash
        run: |
          mkdir -p ~/.vmodules
          mv ./vsl ~/.vmodules/vsl

      - name: Install Vulkan headers (Windows)
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.3.296.0
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true

      - name: Run Windows compute smoke
        shell: bash
        env:
          VJOBS: '1'
        run: |
          vulkan_root="${VULKAN_SDK//\\//}"
          export CFLAGS="-I${vulkan_root}/Include"
          export LIB="${vulkan_root}/Lib"
          cat > "$RUNNER_TEMP/vsl_windows_smoke.v" <<'EOF'
          import vsl.compute

          fn main() {
            assert compute.op_supported(.cpu, 'gemm')
          }
          EOF
          v run "$RUNNER_TEMP/vsl_windows_smoke.v"
          v test ~/.vmodules/vsl/compute/context_test.v

  run-tests-on-cuda:
    # CUDA tests require a machine with NVIDIA GPU + CUDA Toolkit.
    # Only runs on main branch pushes (not PRs from forks — no GPU access in CI).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: linux-x64-16c

    steps:
      - name: Checkout VSL
        uses: actions/checkout@v4
        with:
          path: vsl

      - name: Setup V
        uses: vlang/setup-v@v1.6
        with:
          check-latest: true

      - name: V doctor
        run: v doctor

      - name: Install CUDA toolkit
        run: |
          sudo apt-get update && \
          sudo apt-get install --quiet -y --no-install-recommends \
            cuda-toolkit-12-2 \
            libcudnn8 libcudnn8-dev

      - name: Verify CUDA installation
        run: |
          nvcc --version
          nvidia-smi || echo "nvidia-smi not available in container (expected on some runners)"

      - name: Move VSL source code to V Modules
        run: mv ./vsl ~/.vmodules

      - name: Execute Tests using CUDA Backend
        run: |
          v wipe-cache
          ~/.vmodules/vsl/bin/test --use-cuda
          # Optional: GPU layernorm when cuDNN 9.1+ symbols are present
          VSL_TEST_CUDA=1 v -d cuda -d cudnn_layernorm test ~/.vmodules/vsl/cuda/compute/numerical_validation_test.v || true

  run-tests-on-macos:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
        flags:
          - ""
          - "--prod"

    steps:
      - name: Checkout VSL
        uses: actions/checkout@v4
        with:
          path: vsl

      - name: Setup V
        uses: vlang/setup-v@v1.6
        with:
          check-latest: true

      - name: V doctor
        run: v doctor

      - name: Install dependencies
        run: |
          brew install coreutils
          brew install gcc
          brew install libomp
          brew install hdf5
          brew install open-mpi
          brew install openblas
          brew install lapack
          brew install opencl-headers
          brew install vulkan-headers

      - name: Export Homebrew BLAS/LAPACK paths
        run: |
          OPENBLAS_PREFIX="$(brew --prefix openblas)"
          LAPACK_PREFIX="$(brew --prefix lapack)"
          {
            echo "CPPFLAGS=-I${OPENBLAS_PREFIX}/include -I${LAPACK_PREFIX}/include ${CPPFLAGS:-}"
            echo "CFLAGS=-I${OPENBLAS_PREFIX}/include -I${LAPACK_PREFIX}/include ${CFLAGS:-}"
            echo "LDFLAGS=-L${OPENBLAS_PREFIX}/lib -L${LAPACK_PREFIX}/lib ${LDFLAGS:-}"
            echo "PKG_CONFIG_PATH=${OPENBLAS_PREFIX}/lib/pkgconfig:${LAPACK_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          } >> "$GITHUB_ENV"

      - name: Move VSL source code to V Modules
        run: mv ./vsl ~/.vmodules

      # - name: Execute Tests using Pure V Backend
      #   run: ~/.vmodules/vsl/bin/test

      - name: Execute Tests using Pure V Backend with Pure C Backend
        run: |
          v wipe-cache
          ~/.vmodules/vsl/bin/test --use-cblas --use-lapacke
