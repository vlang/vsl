name: VSL Continuous Integration

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  run-tests-on-linux:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-22.04
        flags:
          - ""
          - "--prod"

    steps:
      - name: Checkout VSL
        uses: actions/checkout@v4
        with:
          path: vsl

      - name: Setup V
        uses: vlang/setup-v@v1.3
        with:
          check-latest: true

      - name: V doctor
        run: v doctor

      - name: Install dependencies
        run: |
          sudo apt-get update && \
          sudo apt-get install --quiet -y --no-install-recommends \
            gfortran \
            libxi-dev \
            libxcursor-dev \
            mesa-common-dev \
            liblapacke-dev \
            libopenblas-dev \
            libgc-dev \
            libgl1-mesa-dev \
            libopenmpi-dev \
            libhdf5-dev \
            hdf5-tools \
            opencl-headers \
            ocl-icd-opencl-dev \
            vulkan-tools \
            mesa-vulkan-drivers \
            libvulkan-dev

      - name: Move VSL source code to V Modules
        run: mv ./vsl ~/.vmodules

      - name: Execute Tests using Pure V Backend
        run: |
          v wipe-cache
          ~/.vmodules/vsl/bin/test ${{ matrix.flags }} --use-cblas

      - name: Execute Tests using Pure V Backend with Pure C Backend
        run: |
          v wipe-cache
          ~/.vmodules/vsl/bin/test ${{ matrix.flags }} --use-cblas --use-lapacke

      - name: Execute Tests using Vulkan Compute Backend
        run: |
          v wipe-cache
          ~/.vmodules/vsl/bin/test ${{ matrix.flags }} --use-vulkan

  run-tests-on-cuda:
    # CUDA tests require a machine with NVIDIA GPU + CUDA Toolkit.
    # Only runs on main branch pushes (not PRs from forks — no GPU access in CI).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: linux-x64-16c

    steps:
      - name: Checkout VSL
        uses: actions/checkout@v4
        with:
          path: vsl

      - name: Setup V
        uses: vlang/setup-v@v1.3
        with:
          check-latest: true

      - name: V doctor
        run: v doctor

      - name: Install CUDA toolkit
        run: |
          sudo apt-get update && \
          sudo apt-get install --quiet -y --no-install-recommends \
            cuda-toolkit-12-2 \
            libcudnn8 libcudnn8-dev

      - name: Verify CUDA installation
        run: |
          nvcc --version
          nvidia-smi || echo "nvidia-smi not available in container (expected on some runners)"

      - name: Move VSL source code to V Modules
        run: mv ./vsl ~/.vmodules

      - name: Execute Tests using CUDA Backend
        run: |
          v wipe-cache
          ~/.vmodules/vsl/bin/test --use-cuda

  run-tests-on-macos:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
        flags:
          - ""
          - "--prod"

    steps:
      - name: Checkout VSL
        uses: actions/checkout@v4
        with:
          path: vsl

      - name: Setup V
        uses: vlang/setup-v@v1.3
        with:
          check-latest: true

      - name: V doctor
        run: v doctor

      - name: Install dependencies
        run: |
          brew install coreutils
          brew install gcc
          brew install libomp
          brew install hdf5
          brew install open-mpi
          brew install openblas
          brew install lapack
          brew install opencl-headers
          brew install vulkan-headers

      - name: Move VSL source code to V Modules
        run: mv ./vsl ~/.vmodules

      # - name: Execute Tests using Pure V Backend
      #   run: ~/.vmodules/vsl/bin/test

      - name: Execute Tests using Pure V Backend with Pure C Backend
        run: |
          v wipe-cache
          ~/.vmodules/vsl/bin/test --use-cblas --use-lapacke
