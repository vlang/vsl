name: V Lint

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - '**.md'
      - '**.v'
      - '.github/workflows/v-lint.yml'

  pull_request:
    branches:
      - main
    paths:
      - '**.md'
      - '**.v'
      - '.github/workflows/v-lint.yml'

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout VSL
        uses: actions/checkout@v4
        with:
          path: vsl
      - name: Setup V
        uses: vlang/setup-v@v1.6
        with:
          check-latest: true
      - name: Install dependencies
        run: |
          sudo apt-get update && \
          sudo apt-get install --quiet -y --no-install-recommends \
            gfortran \
            libxi-dev \
            libxcursor-dev \
            mesa-common-dev \
            liblapacke-dev \
            libopenblas-dev \
            libgc-dev \
            libgl1-mesa-dev \
            libopenmpi-dev \
            libhdf5-dev \
            hdf5-tools \
            opencl-headers \
            ocl-icd-opencl-dev \
            libvulkan-dev
      - name: Setup VSL as V module
        run: mv vsl ~/.vmodules/
      - name: Validate Docs
        run: v check-md -hide-warnings ~/.vmodules/vsl

  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout VSL
        uses: actions/checkout@v4
        with:
          path: vsl
      - name: Setup V
        uses: vlang/setup-v@v1.6
        with:
          check-latest: true
      - name: Setup VSL as V module
        run: mv vsl ~/.vmodules/
      - name: Check Formatting
        # NOTE: `cd` into module dir required. Currently, running `v fmt -verify` from outside the module dir
        # would encounter errors and `v fmt -w` would even break the module.
        run: cd ~/.vmodules/vsl && v fmt -verify .
